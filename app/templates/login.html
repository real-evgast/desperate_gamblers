<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход · Desperate Gamblers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="auth-layout auth-layout--single">
        <section class="auth-card auth-card--wide">
            <div class="auth-card__head">
                <div class="brand">
                    <span class="brand__eyebrow">private tables</span>
                    <span class="brand__name">Desperate Gamblers</span>
                </div>

                <div class="eyebrow">Вход</div>
                <h2 class="auth-card__title">С возвращением</h2>
                <p class="auth-card__copy">
                    Используйте свой логин и пароль, чтобы продолжить работу с матчами.
                </p>

            </div>

            <form method="POST" class="auth-form">
                <div class="field-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" placeholder="Введите логин" required>
                </div>

                <div class="field-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn-primary">Войти в систему</button>
                </div>
            </form>

            <p class="footer-link">
                Еще нет аккаунта?
                <a href="{{ url_for('register') }}">Создать аккаунт</a>
            </p>
        </section>
    </main>
</body>
</html>
