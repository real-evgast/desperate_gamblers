<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать партию · Desperate Gamblers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="topbar__inner">
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand__eyebrow">table setup</span>
                <span class="brand__name">Desperate Gamblers</span>
            </a>

            <nav class="topbar__nav">
                <a href="{{ url_for('index') }}" class="nav-link">Главная</a>
                <a href="{{ url_for('profile') }}" class="nav-link">Профиль</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="site-shell">
            <section class="hero">
                <div class="hero__grid">
                    <div class="hero__content">
                        <div class="eyebrow">Новая запись</div>
                        <h1 class="hero__title">Создайте новую партию</h1>
                    </div>
                </div>
            </section>

            <section class="page-section">
                <div class="form-layout form-layout--single">
                    <article class="form-card">
                        <div>
                            <div class="eyebrow">Форма матча</div>
                            <h2 class="form-card__title">Заполните детали партии</h2>
                        </div>

                        <form method="POST" id="create-match-form" class="match-form form-stack">
                            <section class="stack-section">
                                <div class="stack-section__head">
                                    <h3 class="stack-section__title">Параметры матча</h3>
                                </div>

                                <div class="field-grid field-grid--triple">
                                    <div class="field-group">
                                        <label for="game_name">Название игры</label>
                                        <select id="game_name" name="game_name" required>
                                            <option value="" disabled selected>Выберите игру</option>
                                            {% set current_game_id = current_match.game_id if editing and current_match and current_match.game_id is defined else none %}
                                            {% set current_game_name = current_match.game_name if editing and current_match and current_match.game_name is defined else none %}
                                            {% set current_game_alt = current_match.game if editing and current_match and current_match.game is defined else none %}
                                            {% for game_id, game_name in zip(list_game_id, list_game) %}
                                            <option value="{{ game_id }}" {% if editing and current_match and ((current_game_id is not none and (game_id|string) == (current_game_id|string)) or (current_game_name is not none and (game_id|string) == (current_game_name|string)) or (current_game_name is not none and (game_name|string) == (current_game_name|string)) or (current_game_alt is not none and (game_name|string) == (current_game_alt|string))) %}selected{% endif %}>{{ game_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>

                                    <div class="field-group">
                                        <label for="winner-scores-toggle">Поля очков</label>
                                        <div class="toggle-card">
                                            <p class="toggle-card__copy">Показывать поля очков.</p>
                                            <label class="switch" for="winner-scores-toggle">
                                                <input type="checkbox" id="winner-scores-toggle" name="winner_scores_enabled" checked>
                                                <span class="switch__slider"></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section class="stack-section">
                                <div class="stack-section__head">
                                    <h3 class="stack-section__title">Участники матча</h3>
                                </div>

                                <label for="players-container">Игроки, статус победы и очки</label>
                                <div id="players-container" class="players-container"></div>
                            </section>

                            <div class="auth-actions">
                                <button type="submit" class="btn-primary">Сохранить партию</button>
                                <a href="{{ url_for('index') }}" class="btn-secondary">Отмена</a>
                            </div>
                        </form>
                    </article>
                </div>
            </section>
        </div>
    </main>

    <template id="player-row-template">
        <div class="player-row">
            <div class="player-field">
                <div class="player-field__label">Игрок</div>
                <select class="player-select" name="players">
                    <option value="" disabled selected>Выберите участника</option>
                    {% for user_id, username in zip(list_user_id, list_user) %}
                    <option value="{{ user_id }}">{{ username }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="player-field player-field--score">
                <div class="player-field__label">Очки</div>
                <input type="number" name="scores" class="player-score-input" placeholder="Очки">
            </div>

            <input type="hidden" name="winner_flags" value="false" class="winner-flag-input">

            <div class="player-field">
                <div class="player-field__label">Статус</div>
                <label class="winner-toggle" aria-label="Игрок победил">
                    <input type="checkbox" value="true" class="winner-checkbox">
                    <span>Победил</span>
                </label>
            </div>

            <div class="player-field player-field--remove">
                <button type="button" class="delete-row-btn" aria-label="Удалить участника">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-1 6h2v8H8V9Zm6 0h2v8h-2V9ZM6 9h2v8H6V9Zm1 11h10a2 2 0 0 0 2-2V7H5v11a2 2 0 0 0 2 2Z"/>
                    </svg>
                </button>
            </div>
        </div>
    </template>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const playersContainer = document.getElementById('players-container');
            const template = document.getElementById('player-row-template');
            const form = document.getElementById('create-match-form');
            const scoresToggle = document.getElementById('winner-scores-toggle');
            const isEditing = {{ 'true' if editing else 'false' }};
            const currentMatch = {% if editing and current_match %}{
                game_id: {{ current_match.game_id|default('', true)|tojson }},
                game_name: {{ current_match.game_name|default('', true)|tojson }},
                game: {{ current_match.game|default('', true)|tojson }},
                result: {{ current_match.result|default([], true)|tojson }},
                winners: {{ current_match.winners|default([], true)|tojson }},
                winner_list: {{ current_match.winner_list|default([], true)|tojson }},
                player_list: {{ current_match.player_list|default([], true)|tojson }},
                losers: {{ current_match.losers|default([], true)|tojson }},
                participants: {{ current_match.participants|default([], true)|tojson }},
                players: {{ current_match.players|default([], true)|tojson }},
                scores: {{ current_match.scores|default([], true)|tojson }}
            }{% else %}null{% endif %};

            function normalizeArray(value) {
                if (Array.isArray(value)) {
                    return value.filter((item) => item !== null && item !== undefined && String(item).trim() !== '');
                }

                if (typeof value === 'string') {
                    return value
                        .split(',')
                        .map((item) => item.trim())
                        .filter(Boolean);
                }

                return [];
            }

            function setSelectByValueOrText(select, rawValue) {
                const target = String(rawValue ?? '').trim();
                if (!target) {
                    return false;
                }

                const directOption = Array.from(select.options).find((option) => option.value === target);
                if (directOption) {
                    select.value = directOption.value;
                    return true;
                }

                const textOption = Array.from(select.options).find((option) => option.textContent.trim() === target);
                if (textOption) {
                    select.value = textOption.value;
                    return true;
                }

                return false;
            }

            function addPlayerRow(prefillData) {
                const newRow = template.content.cloneNode(true);
                const row = newRow.querySelector('.player-row');
                playersContainer.appendChild(newRow);

                if (prefillData && row) {
                    const playerSelect = row.querySelector('.player-select');
                    const scoreInput = row.querySelector('.player-score-input');
                    const winnerCheckbox = row.querySelector('.winner-checkbox');
                    const hiddenFlag = row.querySelector('.winner-flag-input');

                    setSelectByValueOrText(playerSelect, prefillData.player);

                    if (prefillData.score !== null && prefillData.score !== undefined && String(prefillData.score).trim() !== '') {
                        scoreInput.value = String(prefillData.score).trim();
                    }

                    winnerCheckbox.checked = Boolean(prefillData.isWinner);
                    hiddenFlag.value = winnerCheckbox.checked ? 'true' : 'false';
                }

                updateDeleteButtons();
                syncWinnerFlags();
                syncScoreVisibility();
                return row;
            }

            function getPrefillRows(matchData) {
                const scores = normalizeArray(matchData.scores);
                const explicitPlayers = normalizeArray(matchData.players);

                if (explicitPlayers.length) {
                    return explicitPlayers.map((player, index) => {
                        const isWinner = player && typeof player === 'object'
                            ? Boolean(player.is_winner ?? player.winner ?? player.isWinner)
                            : false;
                        const playerValue = player && typeof player === 'object'
                            ? (player.id ?? player.user_id ?? player.username ?? player.name ?? '')
                            : player;
                        const scoreValue = player && typeof player === 'object'
                            ? (player.score ?? player.points ?? player.result_score ?? scores[index] ?? '')
                            : (scores[index] ?? '');

                        return {
                            player: playerValue,
                            score: scoreValue,
                            isWinner: isWinner
                        };
                    });
                }

                const winners = normalizeArray(matchData.result ?? matchData.winners ?? matchData.winner_list);
                const losers = normalizeArray(matchData.player_list ?? matchData.losers ?? matchData.participants);
                const winnerRows = winners.map((player, index) => ({
                    player: player,
                    score: scores[index] ?? '',
                    isWinner: true
                }));
                const loserRows = losers.map((player, index) => ({
                    player: player,
                    score: scores[winners.length + index] ?? '',
                    isWinner: false
                }));

                return winnerRows.concat(loserRows);
            }

            function prefillEditingForm(matchData) {
                const gameSelect = document.getElementById('game_name');
                setSelectByValueOrText(gameSelect, matchData.game_id ?? matchData.game_name ?? matchData.game ?? '');

                const rows = getPrefillRows(matchData);
                const hasScoreData = rows.some((row) => row.score !== null && row.score !== undefined && String(row.score).trim() !== '');

                if (!hasScoreData) {
                    scoresToggle.checked = false;
                }

                if (rows.length) {
                    rows.forEach((rowData) => addPlayerRow(rowData));
                } else {
                    addPlayerRow();
                }

                addPlayerRow();
            }

            function updateDeleteButtons() {
                const allRows = playersContainer.querySelectorAll('.player-row');
                allRows.forEach((row) => {
                    const deleteBtn = row.querySelector('.delete-row-btn');
                    if (deleteBtn) {
                        deleteBtn.style.display = (allRows.length > 1) ? 'inline-flex' : 'none';
                    }
                });
            }

            function syncWinnerFlags() {
                const allRows = playersContainer.querySelectorAll('.player-row');
                allRows.forEach((row) => {
                    const checkbox = row.querySelector('.winner-checkbox');
                    const hiddenFlag = row.querySelector('.winner-flag-input');
                    hiddenFlag.value = checkbox.checked ? 'true' : 'false';
                });
            }

            function syncScoreVisibility() {
                playersContainer.classList.toggle('scores-hidden', !scoresToggle.checked);

                const allRows = playersContainer.querySelectorAll('.player-row');
                allRows.forEach((row) => {
                    const scoreInput = row.querySelector('.player-score-input');

                    if (!scoresToggle.checked) {
                        scoreInput.dataset.previousValue = scoreInput.value;
                        scoreInput.value = '';
                    } else if (scoreInput.dataset.previousValue && !scoreInput.value) {
                        scoreInput.value = scoreInput.dataset.previousValue;
                    }
                });
            }

            function cleanEmptyRowsBeforeSubmit() {
                const allRows = Array.from(playersContainer.querySelectorAll('.player-row'));

                allRows.forEach((row) => {
                    const select = row.querySelector('.player-select');
                    if (!select.value) {
                        row.remove();
                    }
                });

                if (!playersContainer.querySelector('.player-row')) {
                    addPlayerRow();
                }

                updateDeleteButtons();
                syncWinnerFlags();
                syncScoreVisibility();
            }

            if (isEditing && currentMatch) {
                prefillEditingForm(currentMatch);
            } else {
                addPlayerRow();
            }

            scoresToggle.addEventListener('change', syncScoreVisibility);

            playersContainer.addEventListener('change', function(event) {
                if (event.target.matches('.player-select')) {
                    const lastSelect = playersContainer.querySelector('.player-row:last-child .player-select');
                    if (event.target === lastSelect && event.target.value) {
                        addPlayerRow();
                    }
                }

                if (event.target.matches('.winner-checkbox')) {
                    syncWinnerFlags();
                }
            });

            playersContainer.addEventListener('click', function(event) {
                if (event.target.matches('.delete-row-btn') || event.target.closest('.delete-row-btn')) {
                    if (playersContainer.querySelectorAll('.player-row').length > 1) {
                        event.target.closest('.player-row').remove();
                        updateDeleteButtons();
                        syncWinnerFlags();
                    }
                }
            });

            form.addEventListener('submit', function(event) {
                let validationFailed = false;

                cleanEmptyRowsBeforeSubmit();
                syncWinnerFlags();

                playersContainer.querySelectorAll('.player-row').forEach(row => {
                    const select = row.querySelector('.player-select');
                    const scoreInput = row.querySelector('.player-score-input');

                    if (select.value && scoresToggle.checked && !scoreInput.value) {
                        alert('Пожалуйста, введите очки для всех участников, если поля очков включены.');
                        scoreInput.focus();
                        validationFailed = true;
                        event.preventDefault();
                    }
                });

                if (validationFailed) {
                    return;
                }
            });
        });
    </script>
</body>
</html>
