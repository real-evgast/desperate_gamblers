<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать партию · Desperate-gamblers</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div style="font-weight: 600;">Desperate-gamblers</div>
        <div>
            <a href="{{ url_for('index') }}" style="color: white; margin-right: 15px;">Главная</a>
            <a href="{{ url_for('profile') }}" style="color: white; margin-right: 15px;">Профиль</a>
            <a href="{{ url_for('logout') }}" style="color: white;">Выйти</a>
        </div>
    </header>

    <div class="container">
        <h2>Создать новую партию</h2>
        <form method="POST" id="create-match-form" class="auth-container" style="width: 100%;">
            <label for="game_name">Название игры</label>
            <select id="game_name" name="game_name" required>
                <option value="" disabled selected>Выбирите игру</option>
                {% for game_id, game_name in zip(list_game_id, list_game) %}
                <option value="{{ game_id }}">{{ game_name }}</option>
                {% endfor %}
            </select>

            <label for="winner">Победитель и его очки</label>
            <div class="player-row">
                <select id="winner" name="winner" required style="margin-bottom: 0;">
                    <option value="" disabled selected>Выберите победителя</option>
                    {% for user_id, username in zip(list_user_id, list_user) %}
                    <option value="{{ user_id }}">{{ username }}</option>
                    {% endfor %}
                </select>
                <input type="number" name="winner_score" class="player-score-input" placeholder="Очки" required style="margin-bottom: 0;">
            </div>


            <!-- Контейнер для динамического добавления игроков -->
            <label style="margin-top: 15px;">Остальные участники и их очки</label>
            <div id="players-container">
                <!-- Сюда будут добавляться строки с полями для игрока и очков -->
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 15px;">Создать партию</button>
        </form>
    </div>

    <!-- Шаблон для новой строки с выбором игрока и полем для очков -->
    <template id="player-row-template">
        <div class="player-row">
            <select class="player-select" name="players" style="margin-bottom: 0;">
                <option value="" disabled selected>Выберите участника</option>
                {% for user_id, username in zip(list_user_id, list_user) %}
                <option value="{{ user_id }}">{{ username }}</option>
                {% endfor %}
            </select>
            <input type="number" name="scores" class="player-score-input" placeholder="Очки" style="margin-bottom: 0;">
            <button type="button" class="delete-row-btn">🗑️</button>
        </div>
    </template>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const playersContainer = document.getElementById('players-container');
            const template = document.getElementById('player-row-template');
            const form = document.getElementById('create-match-form');

            function addPlayerRow() {
                const newRow = template.content.cloneNode(true);
                playersContainer.appendChild(newRow);
                updateDeleteButtons();
            }

            function updateDeleteButtons() {
                const allRows = playersContainer.querySelectorAll('.player-row');
                allRows.forEach((row, index) => {
                    const deleteBtn = row.querySelector('.delete-row-btn');
                    if (deleteBtn) {
                        // Скрываем кнопку, если это первая и единственная строка
                        deleteBtn.style.display = (allRows.length > 1) ? 'inline-block' : 'none';
                    }
                });
            }

            // Добавляем первую строку сразу
            addPlayerRow();

            // Слушаем событие 'change' на select'ах внутри контейнера
            playersContainer.addEventListener('change', function(event) {
                if (event.target.matches('.player-select')) {
                    const lastSelect = playersContainer.querySelector('.player-row:last-child .player-select');
                    if (event.target === lastSelect && event.target.value) {
                        addPlayerRow();
                    }
                }
            });

            // Слушаем клики по кнопкам удаления
            playersContainer.addEventListener('click', function(event) {
                if (event.target.matches('.delete-row-btn')) {
                    // Запрещаем удаление, если осталась только одна строка
                    if (playersContainer.querySelectorAll('.player-row').length > 1) {
                        event.target.closest('.player-row').remove();
                        updateDeleteButtons();
                    }
                }
            });

            // Перехватываем отправку формы для условной валидации
            form.addEventListener('submit', function(event) {
                const allPlayerRows = playersContainer.querySelectorAll('.player-row');
                let validationFailed = false;

                allPlayerRows.forEach(row => {
                    const select = row.querySelector('.player-select');
                    const scoreInput = row.querySelector('.player-score-input');

                    // Если игрок выбран, но очки не введены
                    if (select.value && !scoreInput.value) {
                        alert('Пожалуйста, введите очки для всех выбранных участников.');
                        scoreInput.focus(); // Устанавливаем фокус на незаполненное поле
                        validationFailed = true;
                        event.preventDefault(); // Предотвращаем отправку формы
                        return; // Выходим из forEach
                    }
                });

                if (validationFailed) {
                    return; // Если валидация не прошла, останавливаемся
                }

                // Если валидация прошла успешно, форма будет отправлена
            });
        });
    </script>

</body>
</html>
